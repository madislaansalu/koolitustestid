<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toiduhügieeni test</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --ink-light: #3a3a5c;
  --paper: #f5f0e8;
  --paper-dark: #ede7d9;
  --accent: #c84b31;
  --success: #2d6a4f;
  --success-bg: #d8f3dc;
  --fail-bg: #fde8e4;
  --border: #c8bfaa;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "DM Sans", sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 20% 80%, rgba(200,75,49,.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(232,160,32,.06) 0%, transparent 50%);
}
header {
  background: var(--ink);
  color: var(--paper);
  padding: 0 1.5rem;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,.3);
}
header h1 {
  font-family: "DM Serif Display", serif;
  font-size: 1.3rem;
}
.badge {
  font-size: .72rem;
  font-weight: 600;
  background: var(--accent);
  color: #fff;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: .05em;
  text-transform: uppercase;
}
.wrap {
  max-width: 820px;
  margin: 0 auto;
  padding: 2rem 1.5rem 5rem;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: none; }
}
.card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 2px 8px rgba(0,0,0,.04);
  animation: fadeUp .4s ease both;
}
.intro-title {
  font-family: "DM Serif Display", serif;
  font-size: 2rem;
  margin-bottom: .3rem;
}
.intro-sub {
  color: var(--ink-light);
  font-size: .9rem;
  font-weight: 300;
  margin-bottom: 1.5rem;
}
.name-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.name-row label {
  font-size: .82rem;
  font-weight: 600;
  color: var(--ink-light);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.name-row input {
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-family: "DM Sans", sans-serif;
  font-size: .95rem;
  color: var(--ink);
  background: var(--paper);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.name-row input:focus {
  border-color: var(--ink);
  box-shadow: 0 0 0 3px rgba(26,26,46,.08);
  background: #fff;
}
.q-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.4rem 1.5rem;
  margin-bottom: 1.2rem;
  box-shadow: 0 2px 8px rgba(0,0,0,.04);
  animation: fadeUp .4s ease both;
  transition: border-color .3s;
}
.q-card.correct-card  { border-color: #63992280; }
.q-card.wrong-card    { border-color: #c84b3180; }
.q-meta {
  font-size: .78rem;
  color: var(--ink-light);
  margin-bottom: 4px;
}
.q-text {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 4px;
  line-height: 1.45;
}
.q-hint {
  font-size: .8rem;
  color: var(--ink-light);
  font-style: italic;
  margin-bottom: 1rem;
}
.options { display: flex; flex-direction: column; gap: 7px; }
.opt-label {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  cursor: pointer;
  font-size: .9rem;
  transition: border-color .15s, background .15s;
  user-select: none;
}
.opt-label:hover { border-color: var(--ink-light); background: var(--paper); }
.opt-label input[type=checkbox] { display: none; }
.opt-box {
  width: 20px;
  height: 20px;
  min-width: 20px;
  border: 2px solid var(--border);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .75rem;
  font-weight: 700;
  transition: all .15s;
  margin-top: 1px;
}
.opt-label.selected .opt-box {
  background: var(--ink);
  border-color: var(--ink);
  color: #fff;
}
.opt-label.selected { border-color: var(--ink); background: var(--paper); }

/* After submission */
.opt-label.opt-correct {
  background: #eaf3de;
  border-color: #63992280;
  color: #27500a;
  cursor: default;
}
.opt-label.opt-correct .opt-box {
  background: #3b6d11;
  border-color: #3b6d11;
  color: #fff;
}
.opt-label.opt-wrong-sel {
  background: var(--fail-bg);
  border-color: #c84b3180;
  color: #7f1d1d;
  cursor: default;
}
.opt-label.opt-wrong-sel .opt-box {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.opt-label.opt-missed {
  background: #fff8e1;
  border-color: #f0b429;
  cursor: default;
}
.opt-label.opt-missed .opt-box {
  background: #f0b429;
  border-color: #f0b429;
  color: #fff;
}
.opt-label.opt-neutral {
  opacity: .7;
  cursor: default;
}
.q-result {
  display: none;
  margin-top: .8rem;
  font-size: .82rem;
  font-weight: 600;
  padding: 6px 10px;
  border-radius: 6px;
}
.q-result.ok  { display: block; background: var(--success-bg); color: var(--success); }
.q-result.err { display: block; background: var(--fail-bg); color: var(--accent); }

/* Submit button */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 12px 28px;
  border-radius: 8px;
  font-family: "DM Sans", sans-serif;
  font-weight: 600;
  font-size: .95rem;
  cursor: pointer;
  border: none;
  transition: all .2s;
}
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { opacity: .9; transform: translateY(-1px); }
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--ink);
}
.btn-outline:hover { border-color: var(--ink); background: var(--paper-dark); }
.btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 1.5rem; }

/* Score panel */
#scorePanel {
  display: none;
  background: #fff;
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  margin-bottom: 2rem;
  text-align: center;
  animation: fadeUp .5s ease both;
}
#scorePanel.pass { border-color: #3b6d11; }
#scorePanel.fail { border-color: var(--accent); }
.score-icon { font-size: 3rem; margin-bottom: .5rem; }
.score-title {
  font-family: "DM Serif Display", serif;
  font-size: 1.8rem;
  margin-bottom: .3rem;
}
.score-num {
  font-size: 3.5rem;
  font-family: "DM Serif Display", serif;
  line-height: 1;
  margin: .5rem 0;
}
.score-num.pass-color { color: var(--success); }
.score-num.fail-color { color: var(--accent); }
.score-sub { color: var(--ink-light); font-size: .9rem; margin-bottom: 1.2rem; }
.score-verdict {
  display: inline-block;
  padding: 6px 20px;
  border-radius: 20px;
  font-weight: 600;
  font-size: .9rem;
  margin-bottom: 1rem;
}
.score-verdict.pass { background: var(--success-bg); color: var(--success); }
.score-verdict.fail { background: var(--fail-bg); color: var(--accent); }
.progress-bar-wrap {
  background: var(--paper-dark);
  border-radius: 10px;
  height: 10px;
  margin: .8rem 0 1.2rem;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  border-radius: 10px;
  transition: width .8s ease;
}
.progress-bar.pass { background: var(--success); }
.progress-bar.fail { background: var(--accent); }

.legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  font-size: .8rem;
  color: var(--ink-light);
  margin-bottom: 1.5rem;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-box {
  width: 16px; height: 16px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: .65rem; font-weight: 700;
}

@media (max-width: 600px) {
  .wrap { padding: 1rem 1rem 4rem; }
  .intro-title { font-size: 1.6rem; }
}
@media print {
  header { display: none; }
  body { background: #fff; }
  .btn-row { display: none; }
  #scorePanel { border: 2px solid #ccc !important; }
}
</style>
</head>
<body>

<header>
  <h1>📋 KoolitusTest</h1>
  <span class="badge">Toiduhügieen</span>
</header>

<div class="wrap">

  <!-- Intro -->
  <div class="card">
    <p class="intro-title">Toiduhügieeni test</p>
    <p class="intro-sub">10 küsimust · Igal küsimusel võib olla mitu õiget vastust · Läbimiseks vajalik ≥ 70%</p>
    <div class="name-row">
      <label for="empName">Töötaja nimi</label>
      <input type="text" id="empName" placeholder="Sisesta oma nimi" autocomplete="name">
    </div>
  </div>

  <!-- Score panel (hidden until submit) -->
  <div id="scorePanel">
    <div class="score-icon" id="scoreIcon"></div>
    <div class="score-title" id="scoreTitle"></div>
    <div class="score-num" id="scoreNum"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="score-sub" id="scoreSub"></div>
    <div class="score-verdict" id="scoreVerdict"></div>
    <div style="margin-top:1rem;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-outline" onclick="window.print()">🖨 Prindi tulemus</button>
      <button class="btn btn-outline" onclick="resetTest()">↺ Tee uuesti</button>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend" id="legend" style="display:none">
    <div class="legend-item">
      <div class="legend-box" style="background:#3b6d11;color:#fff">✓</div>
      <span>Õige vastus</span>
    </div>
    <div class="legend-item">
      <div class="legend-box" style="background:var(--accent);color:#fff">✗</div>
      <span>Vale valik</span>
    </div>
    <div class="legend-item">
      <div class="legend-box" style="background:#f0b429;color:#fff">!</div>
      <span>Märkimata õige vastus</span>
    </div>
  </div>

  <!-- Questions -->
  <div id="questions"></div>

  <!-- Submit row -->
  <div class="btn-row" id="submitRow">
    <button class="btn btn-success" id="btnSubmit" onclick="submitTest()">Esita test →</button>
  </div>

</div>

<script>
const PASS_THRESHOLD = 70;

const questions = [
  {
    text: "Mis on HACCP-süsteemi põhimõte?",
    hint: "Võib olla mitu õiget vastust.",
    options: [
      { text: "Ohtude analüüs ja kriitiliste kontrollpunktide süsteem", correct: true },
      { text: "Ainult valmistoodangu kontrollimine laboratooriumis", correct: false },
      { text: "Probleemide ennetamine, mitte järelkontroll", correct: true },
      { text: "Ainult mikrobioloogiliste ohtude käsitlemine", correct: false }
    ]
  },
  {
    text: "Millised temperatuurid kuuluvad nn ohtlikku tsooni, kus mikroorganismid kõige kiiremini paljunevad?",
    hint: "Vali kõik õiged vastused.",
    options: [
      { text: "+6 °C kuni +63 °C", correct: true },
      { text: "+20 °C kuni +37 °C (selle vahemiku sees, kus paljunemine on kiireim)", correct: true },
      { text: "–18 °C kuni 0 °C", correct: false },
      { text: "Üle +63 °C", correct: false }
    ]
  },
  {
    text: "Milliseid toite loetakse kõrge riskiga (1. kategooria) toiduaineteks?",
    hint: "Vali kõik õiged vastused.",
    options: [
      { text: "Jahutatud liha- ja kalatooted", correct: true },
      { text: "Keedised ja marmelaad", correct: false },
      { text: "Pastöriseerimata piim", correct: true },
      { text: "Lastetoit", correct: true }
    ]
  },
  {
    text: "Millised tunnused eristavad toidumürgistust (intoksikatsiooni) toiduinfektsioonist?",
    hint: "Vali kõik õiged vastused.",
    options: [
      { text: "Haiguse põhjustab mikroobide toidus toodetud toksiin, mitte elusad bakterid", correct: true },
      { text: "Peiteperiood on tavaliselt lühem (mõnest tunnist)", correct: true },
      { text: "Haigustekitaja peab toidus paljunema inimese soolestikus", correct: false },
      { text: "Toidumürgistust võivad põhjustada ka hallitusseente mükotoksiinid", correct: true }
    ]
  },
  {
    text: "Millised väited Listeria monocytogenes'i kohta on õiged?",
    hint: "Vali kõik õiged vastused.",
    options: [
      { text: "Bakter suudab paljuneda ka +1,5 °C juures", correct: true },
      { text: "Bakter hävib kuumutamisel üle 72 °C", correct: true },
      { text: "Listeria on kõige ohtlikum noortele täiskasvanutele ilma riskirühmata", correct: false },
      { text: "Bakter võib moodustada toidukäitlemisruumides biokilet", correct: true }
    ]
  },
  {
    text: "Millal on toidukäitleja jaoks kätepesu kohustuslik?",
    hint: "Vali kõik õiged vastused.",
    options: [
      { text: "Pärast WC-s käimist", correct: true },
      { text: "Enne pausi algust (enne lahkumist toidukäitlemisalalt)", correct: false },
      { text: "Pärast toortoidu käitlemist", correct: true },
      { text: "Pärast köhimist või aevastamist", correct: true }
    ]
  },
  {
    text: "Millised väited ristsaastumise vältimise kohta on õiged?",
    hint: "Vali kõik õiged vastused.",
    options: [
      { text: "Toortoit tuleb hoida külmkapis valmistoidust allpool", correct: true },
      { text: "Toor- ja valmistoidu jaoks võib kasutada sama lõikelauda, kui see on visuaalselt puhas", correct: false },
      { text: "Välisjalatseid ei tohi kanda toidukäitlemisalal", correct: true },
      { text: "Eri piirkondade jaoks tuleb kasutada erinevaid puhastustarvikuid", correct: true }
    ]
  },
  {
    text: "Millised väited toidujäätmete käitlemise kohta on õiged?",
    hint: "Vali kõik õiged vastused.",
    options: [
      { text: "Biolagunevaid jäätmeid tuleb koguda eraldi ning konteinerid tühjendada iga päev", correct: true },
      { text: "Katkine klaas tuleb koguda eraldi ning selle kasutamine toidukäitlemisalal on keelatud", correct: true },
      { text: "Pakendijäätmeid võib segada toidujäätmetega samas konteineris", correct: false },
      { text: "Niiske papp tuleb viivitamata eemaldada toidukäitlemisalalt", correct: true }
    ]
  },
  {
    text: "Millised helmintoosid võivad levida kala kaudu?",
    hint: "Vali kõik õiged vastused.",
    options: [
      { text: "Laiuss (kuni 20 m pikk paeluss, levib hauge, siia, lutsu, lõhe, forelli ja koha kaudu)", correct: true },
      { text: "Keeritsuss (Trichinella) — levib metsloomade liha, mitte kala kaudu", correct: false },
      { text: "Nudipaeluss — levib veiseliha kaudu", correct: false },
      { text: "Laiuss on Eestis levinuim kalade kaudu leviv paeluss (keskmiselt 84 juhtu aastas)", correct: true }
    ]
  },
  {
    text: "Millised väited puhastamise ja desinfitseerimise kohta on õiged?",
    hint: "Vali kõik õiged vastused.",
    options: [
      { text: "Desinfitseerimine on tõhus ka ilma eelneva puhastamiseta", correct: false },
      { text: "Mikroobid ei paljune kuival pinnal — pindade kuivatamine pärast pesemist on oluline", correct: true },
      { text: "Klooriaineid ei tohi segada happeliste pesuvahendite puhastusainetega", correct: true },
      { text: "Valgurikaste pindade pesemiseks ei tohi kasutada üle +55 °C vett (valk hüübib ja jääb pinnale kinni)", correct: true }
    ]
  }
];

// Build questions HTML
function buildQuestions() {
  const container = document.getElementById("questions");
  container.innerHTML = "";
  questions.forEach((q, qi) => {
    const card = document.createElement("div");
    card.className = "q-card";
    card.id = "q" + qi;

    const opts = q.options.map((o, oi) => `
      <label class="opt-label" id="opt-${qi}-${oi}" onclick="toggleOpt(${qi},${oi})">
        <input type="checkbox" id="cb-${qi}-${oi}">
        <div class="opt-box" id="box-${qi}-${oi}"></div>
        <span>${o.text}</span>
      </label>
    `).join("");

    card.innerHTML = `
      <div class="q-meta">Küsimus ${qi+1} / ${questions.length}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-hint">${q.hint}</div>
      <div class="options">${opts}</div>
      <div class="q-result" id="qr-${qi}"></div>
    `;
    container.appendChild(card);
  });
}

function toggleOpt(qi, oi) {
  if (document.getElementById("btnSubmit").disabled) return;
  const cb = document.getElementById("cb-"+qi+"-"+oi);
  const lbl = document.getElementById("opt-"+qi+"-"+oi);
  const box = document.getElementById("box-"+qi+"-"+oi);
  cb.checked = !cb.checked;
  if (cb.checked) {
    lbl.classList.add("selected");
    box.textContent = "✓";
  } else {
    lbl.classList.remove("selected");
    box.textContent = "";
  }
}

function submitTest() {
  const name = document.getElementById("empName").value.trim();
  if (!name) {
    document.getElementById("empName").focus();
    document.getElementById("empName").style.borderColor = "var(--accent)";
    setTimeout(() => document.getElementById("empName").style.borderColor = "", 1500);
    return;
  }

  let correct = 0;

  questions.forEach((q, qi) => {
    const selected = q.options.map((_, oi) => document.getElementById("cb-"+qi+"-"+oi).checked);
    const isCorrect = q.options.every((o, oi) => o.correct === selected[oi]);
    if (isCorrect) correct++;

    // Style options
    q.options.forEach((o, oi) => {
      const lbl = document.getElementById("opt-"+qi+"-"+oi);
      const box = document.getElementById("box-"+qi+"-"+oi);
      lbl.classList.remove("selected");
      lbl.style.pointerEvents = "none";

      if (o.correct && selected[oi]) {
        lbl.className = "opt-label opt-correct";
        box.textContent = "✓";
      } else if (!o.correct && selected[oi]) {
        lbl.className = "opt-label opt-wrong-sel";
        box.textContent = "✗";
      } else if (o.correct && !selected[oi]) {
        lbl.className = "opt-label opt-missed";
        box.textContent = "!";
      } else {
        lbl.className = "opt-label opt-neutral";
        box.textContent = "";
      }
    });

    // Question result label
    const qr = document.getElementById("qr-"+qi);
    const card = document.getElementById("q"+qi);
    if (isCorrect) {
      qr.className = "q-result ok";
      qr.textContent = "✓ Õige";
      card.classList.add("correct-card");
    } else {
      qr.className = "q-result err";
      qr.textContent = "✗ Vale — kontrolli rohelisi vastuseid";
      card.classList.add("wrong-card");
    }
  });

  const pct = Math.round(correct / questions.length * 100);
  const pass = pct >= PASS_THRESHOLD;

  // Show score panel
  const panel = document.getElementById("scorePanel");
  panel.style.display = "block";
  panel.className = pass ? "pass" : "fail";
  document.getElementById("scoreIcon").textContent = pass ? "🎉" : "📋";
  document.getElementById("scoreTitle").textContent = name;
  document.getElementById("scoreNum").textContent = correct + " / " + questions.length;
  document.getElementById("scoreNum").className = "score-num " + (pass ? "pass-color" : "fail-color");
  document.getElementById("scoreSub").textContent = pct + "% õigeid vastuseid · Läbimislävi: " + PASS_THRESHOLD + "%";
  const verdict = document.getElementById("scoreVerdict");
  verdict.className = "score-verdict " + (pass ? "pass" : "fail");
  verdict.textContent = pass ? "✓ TEST LÄBITUD" : "✗ TEST LÄBIMATA";

  const bar = document.getElementById("progressBar");
  bar.className = "progress-bar " + (pass ? "pass" : "fail");
  setTimeout(() => { bar.style.width = pct + "%"; }, 50);

  // Show legend
  document.getElementById("legend").style.display = "flex";

  // Disable submit
  document.getElementById("btnSubmit").disabled = true;

  // Scroll to score
  panel.scrollIntoView({ behavior: "smooth", block: "start" });
}

function resetTest() {
  document.getElementById("empName").value = "";
  document.getElementById("scorePanel").style.display = "none";
  document.getElementById("legend").style.display = "none";
  document.getElementById("btnSubmit").disabled = false;
  buildQuestions();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

buildQuestions();
</script>
</body>
</html>
